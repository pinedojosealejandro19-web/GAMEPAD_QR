<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2D Screen Receiver</title>

<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:system-ui;
    color:#fff;
  }
  #info{
    position:fixed;
    top:10px;
    left:10px;
    font-size:14px;
    opacity:.7;
  }
  canvas{
    display:block;
    margin:auto;
    background:#111;
  }
</style>
</head>

<body>

<div id="info">Room: ABCD</div>
<canvas id="game"></canvas>

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
/* ==========================
   FIREBASE CONFIG
========================== */
const firebaseConfig = {
  apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
  authDomain: "pacman-86c4e.firebaseapp.com",
  databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
  projectId: "pacman-86c4e",
  storageBucket: "pacman-86c4e.firebasestorage.app",
  messagingSenderId: "1044337774275",
  appId: "1:1044337774275:web:362fcd603a473c04e95c76"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ==========================
   ROOM
========================== */
const params = new URLSearchParams(location.search);
const room = (params.get("room") || "ABCD").toUpperCase();
document.getElementById("info").textContent = "Room: " + room;

const inputRef = db.ref("rooms/" + room + "/input");

/* ==========================
   CANVAS SETUP
========================== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ==========================
   OBJECT STATE
========================== */
let player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 60,
  color: "#00ff88"
};

let lastT = 0;

/* ==========================
   HANDLE INPUT
========================== */
function handleAction(action){
  const speed = 20;

  if(action === "up") player.y -= speed;
  if(action === "down") player.y += speed;
  if(action === "left") player.x -= speed;
  if(action === "right") player.x += speed;

  if(action === "a") player.color = "#ff3b3b";
  if(action === "b") player.color = "#00ff88";
  if(action === "select") player.color = "#3b82ff";
  if(action === "start") player.size += 10;

  // bounds
  if(player.x < 0) player.x = 0;
  if(player.y < 0) player.y = 0;
  if(player.x + player.size > canvas.width)
    player.x = canvas.width - player.size;
  if(player.y + player.size > canvas.height)
    player.y = canvas.height - player.size;
}

/* ==========================
   FIREBASE LISTENER
========================== */
inputRef.on("value", snap => {
  const data = snap.val();
  if(!data || !data.action) return;

  if(data.t && data.t === lastT) return;
  lastT = data.t;

  handleAction(data.action);
});

/* ==========================
   DRAW LOOP
========================== */
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = player.color;
  ctx.fillRect(player.x, player.y, player.size, player.size);

  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
