<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pac-Man Screen</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#000;
      font-family: Arial, sans-serif;
      color:#fff;
    }
    canvas{
      border: 4px solid yellow;
      background: #000;
      box-shadow: 0 0 20px rgba(255,255,0,.5);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="560" height="620"></canvas>

  <!-- Firebase (COMPAT) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script>
    // ===== FIREBASE CONFIG (YOUR REAL CONFIG) =====
    const firebaseConfig = {
      apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
      authDomain: "pacman-86c4e.firebaseapp.com",
      databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
      projectId: "pacman-86c4e",
      storageBucket: "pacman-86c4e.firebasestorage.app",
      messagingSenderId: "1044337774275",
      appId: "1:1044337774275:web:362fcd603a473c04e95c76"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ===== GET GAME ID (NO ROOM) =====
    const params = new URLSearchParams(location.search);
    const gameId = params.get("gameId") || "DEMO_GAME"; // fallback if you forget

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const state = {
      pacman: { x: 280, y: 310, direction: 0, nextDirection: 0 },
      ghosts: [
        { x: 240, y: 210, color: "#ff0000", dx: 1, dy: 0 },
        { x: 280, y: 210, color: "#ffb8ff", dx: -1, dy: 0 },
        { x: 320, y: 210, color: "#00ffff", dx: 0, dy: 1 }
      ],
      dots: [],
      score: 0
    };

    function isWall(x, y){
      return (x < 20 || x > 540 || y < 40 || y > 600);
    }

    function initDots(){
      state.dots = [];
      for (let x = 40; x < 540; x += 20){
        for (let y = 60; y < 600; y += 20){
          if (!isWall(x, y)) state.dots.push({ x, y, eaten: false });
        }
      }
    }

    function handleInput(action){
      if (action === "up") state.pacman.nextDirection = -1;
      if (action === "down") state.pacman.nextDirection = 1;
      if (action === "left") state.pacman.nextDirection = -2;
      if (action === "right") state.pacman.nextDirection = 2;
    }

    function updatePacman(){
      const speed = 5;
      let newX = state.pacman.x;
      let newY = state.pacman.y;

      // try next direction
      if (state.pacman.nextDirection === -1) newY -= speed;
      else if (state.pacman.nextDirection === 1) newY += speed;
      else if (state.pacman.nextDirection === -2) newX -= speed;
      else if (state.pacman.nextDirection === 2) newX += speed;

      if (!isWall(newX, newY)){
        state.pacman.x = newX;
        state.pacman.y = newY;
        state.pacman.direction = state.pacman.nextDirection;
      } else {
        // continue current direction
        newX = state.pacman.x;
        newY = state.pacman.y;

        if (state.pacman.direction === -1) newY -= speed;
        else if (state.pacman.direction === 1) newY += speed;
        else if (state.pacman.direction === -2) newX -= speed;
        else if (state.pacman.direction === 2) newX += speed;

        if (!isWall(newX, newY)){
          state.pacman.x = newX;
          state.pacman.y = newY;
        }
      }

      // eat dots
      for (const dot of state.dots){
        if (!dot.eaten && Math.abs(dot.x - state.pacman.x) < 10 && Math.abs(dot.y - state.pacman.y) < 10){
          dot.eaten = true;
          state.score += 10;
        }
      }

      db.ref(`games/${gameId}/gameState/score`).set(state.score);
    }

    function updateGhosts(){
      for (const g of state.ghosts){
        const nx = g.x + g.dx * 2;
        const ny = g.y + g.dy * 2;

        if (isWall(nx, ny)){
          const dirs = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
          const nd = dirs[Math.floor(Math.random()*dirs.length)];
          g.dx = nd.dx; g.dy = nd.dy;
        } else {
          g.x = nx; g.y = ny;
        }
      }
    }

    function draw(){
      ctx.fillStyle = "#000";
      ctx.fillRect(0,0,canvas.width,canvas.height);

      ctx.strokeStyle = "#0066ff";
      ctx.lineWidth = 3;
      ctx.strokeRect(20, 40, 520, 560);

      // dots
      ctx.fillStyle = "#ffff00";
      for (const dot of state.dots){
        if (!dot.eaten){
          ctx.beginPath();
          ctx.arc(dot.x, dot.y, 2, 0, Math.PI*2);
          ctx.fill();
        }
      }

      // pacman
      ctx.fillStyle = "#ffff00";
      ctx.beginPath();
      ctx.arc(state.pacman.x, state.pacman.y, 8, 0, Math.PI*2);
      ctx.fill();

      // ghosts
      for (const g of state.ghosts){
        ctx.fillStyle = g.color;
        ctx.beginPath();
        ctx.arc(g.x, g.y, 8, 0, Math.PI*2);
        ctx.fill();
      }

      ctx.fillStyle = "#ffff00";
      ctx.font = "bold 20px Arial";
      ctx.fillText(`Score: ${state.score}`, 30, 30);
    }

    function loop(){
      updatePacman();
      updateGhosts();
      draw();
      requestAnimationFrame(loop);
    }

    // ===== LISTEN TO CONTROLLER ACTIONS (NO ROOM, ALWAYS ON) =====
    let lastT = 0;
    db.ref(`games/${gameId}/actions/lastAction`).on("value", snap => {
      const payload = snap.val();
      if (!payload) return;

      // payload = { action: "left", t: 123456 }
      if (payload.t && payload.t === lastT) return;
      lastT = payload.t || Date.now();

      if (payload.action) handleInput(payload.action);
    });

    // Create base node if missing (optional)
    db.ref(`games/${gameId}`).update({
      status: "active",
      updatedAt: Date.now()
    });

    initDots();
    loop();
  </script>
</body>
</html>
