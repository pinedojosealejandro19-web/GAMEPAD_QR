<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Controller UI (Firebase)</title>

<style>
:root{
  --bg0:#05060b;
  --bg1:#0b0c14;
  --panel: rgba(255,255,255,.06);
  --stroke: rgba(255,255,255,.10);
  --shadow: 0 18px 44px rgba(0,0,0,.6);
  --inset: inset 0 1px 0 rgba(255,255,255,.08), inset 0 -10px 25px rgba(0,0,0,.35);
  --glow: 0 0 0 2px rgba(120,200,255,.12), 0 0 26px rgba(120,200,255,.12);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background: radial-gradient(1200px 700px at 50% 0%, #14162a 0%, var(--bg1) 45%, var(--bg0) 100%);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:system-ui;
  overflow:hidden;
  gap: 12px;
  padding: 14px;
}

.status{
  width: min(920px, 95vw);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid var(--stroke);
  background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
  box-shadow: var(--shadow);
  color: rgba(255,255,255,.9);
  font-size: 14px;
}

.status b{ letter-spacing: .5px; }
.pill{
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.35);
}
.ok{ color:#00ff88; font-weight: 800; }
.bad{ color:#ff4d4d; font-weight: 800; }

.panel{
  width:min(920px,95vw);
  height:min(560px,78vh);
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  align-items:center;
  justify-items:center;
  gap:20px;
  padding:30px;
  border-radius:30px;
  border:1px solid var(--stroke);
  background:linear-gradient(180deg,var(--panel),rgba(255,255,255,.03));
  box-shadow:var(--shadow);
}

/* D-PAD */
.dpad{
  width:min(40vh,40vw,240px);
  height:min(40vh,40vw,240px);
  position:relative;
  display:grid;
  place-items:center;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
.dpad .plus{
  position:absolute;
  inset:15%;
  border-radius:20px;
  background:linear-gradient(180deg,#232535,#12131c);
  box-shadow:var(--inset);
}
.dpad .plus::before{
  content:"";
  position:absolute;
  left:38%;
  width:24%;
  height:100%;
  border-radius:16px;
  background:#1a1b23;
}
.dpad .plus::after{
  content:"";
  position:absolute;
  top:38%;
  height:24%;
  width:100%;
  border-radius:16px;
  background:#1a1b23;
}
.dpad button{
  position:absolute;
  background:transparent;
  border:none;
  cursor:pointer;
  border-radius: 18px;
}
.dpad .up{top:5%;left:35%;width:30%;height:30%;}
.dpad .down{bottom:5%;left:35%;width:30%;height:30%;}
.dpad .left{left:5%;top:35%;width:30%;height:30%;}
.dpad .right{right:5%;top:35%;width:30%;height:30%;}
.dpad button:active{ box-shadow:var(--glow); background: rgba(120,200,255,.06); }

/* MID */
.mid{
  display:flex;
  flex-direction:column;
  gap:20px;
  user-select:none;
  -webkit-user-select:none;
}
.mid button{
  width:200px;
  height:70px;
  border-radius:20px;
  border:1px solid var(--stroke);
  background:linear-gradient(180deg,#2a2c3d,#151626);
  color:#fff;
  font-weight:900;
  letter-spacing:3px;
  font-size:22px;
  box-shadow:var(--inset);
  cursor:pointer;
}
.mid button:active{ box-shadow:var(--inset),var(--glow); transform: scale(.98); }

/* A B */
.ab{
  position:relative;
  width:260px;
  height:200px;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
.ab button{
  position:absolute;
  width:100px;
  height:100px;
  border-radius:50%;
  border:1px solid var(--stroke);
  background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.2), rgba(0,0,0,.5));
  display:grid;
  place-items:center;
  font-size:40px;
  font-weight:900;
  cursor:pointer;
  box-shadow:var(--shadow),var(--inset);
}
.ab .a{ left:20%; bottom:0; color:#ff3b3b; }
.ab .b{ right:0; top:0; color:#63ff88; }
.ab button:active{ transform:scale(.95); box-shadow:var(--shadow),var(--inset),var(--glow); }

/* Small screens */
@media (max-width: 700px){
  .panel{ height: min(620px, 80vh); padding: 18px; gap: 14px; }
  .mid button{ width: 170px; height: 64px; font-size: 20px; }
  .ab{ width: 230px; height: 180px; }
  .ab button{ width: 90px; height: 90px; font-size: 36px; }
}
</style>
</head>

<body>

<div class="status">
  <div>
    <b>ROOM:</b> <span class="pill" id="roomLabel">—</span>
  </div>
  <div id="conn" class="pill bad">connecting…</div>
</div>

<div class="panel">

  <!-- D-PAD -->
  <div class="dpad">
    <div class="plus"></div>
    <button class="up" data-btn="up" aria-label="Up"></button>
    <button class="down" data-btn="down" aria-label="Down"></button>
    <button class="left" data-btn="left" aria-label="Left"></button>
    <button class="right" data-btn="right" aria-label="Right"></button>
  </div>

  <!-- SELECT / START -->
  <div class="mid">
    <button data-btn="select">SELECT</button>
    <button data-btn="start">START</button>
  </div>

  <!-- A / B -->
  <div class="ab">
    <button class="a" data-btn="a" aria-label="A">A</button>
    <button class="b" data-btn="b" aria-label="B">B</button>
  </div>

</div>

<!-- Firebase (COMPAT) -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
  // ✅ Your Firebase config (already yours)
  const firebaseConfig = {
    apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
    authDomain: "pacman-86c4e.firebaseapp.com",
    databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
    projectId: "pacman-86c4e",
    storageBucket: "pacman-86c4e.firebasestorage.app",
    messagingSenderId: "1044337774275",
    appId: "1:1044337774275:web:362fcd603a473c04e95c76"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Room from URL: controller.html?room=ABCD
  const params = new URLSearchParams(location.search);
  const room = (params.get("room") || "ABCD").trim().toUpperCase();

  document.getElementById("roomLabel").textContent = room;

  // Where we write inputs
  const inputRef = db.ref("rooms/" + room + "/input");

  // Connection status
  const connEl = document.getElementById("conn");
  db.ref(".info/connected").on("value", snap => {
    if (snap.val() === true) {
      connEl.textContent = "connected";
      connEl.classList.remove("bad");
      connEl.classList.add("ok");
      // optional: announce
      inputRef.set({ action: "connected", t: Date.now() });
    } else {
      connEl.textContent = "offline";
      connEl.classList.remove("ok");
      connEl.classList.add("bad");
    }
  });

  // Send action
  let last = 0;
  function send(action){
    const now = Date.now();
    if (now - last < 40) return; // small throttle
    last = now;
    inputRef.set({ action, t: now });
  }

  // Bind buttons
  document.querySelectorAll("[data-btn]").forEach(el => {
    const action = el.dataset.btn;

    el.addEventListener("click", () => send(action));

    el.addEventListener("touchstart", (e) => {
      e.preventDefault();
      send(action);
    }, { passive:false });
  });
</script>
</body>
</html>
