<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Pac-Man Controller</title>

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ width:100%; height:100%; overflow:hidden; }
    body{
      display:flex;
      flex-direction:column;
      justify-content:space-around;
      align-items:center;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      font-family: Arial, sans-serif;
      color:#fff;
      padding:20px;
      gap:20px;
      touch-action:none;
    }

    #status{
      font-size:16px;
      text-align:center;
      height:25px;
      min-height:25px;
    }
    .status-ok{ color:#00ff00; font-weight:bold; }
    .status-error{ color:#ff0000; font-weight:bold; }

    .gamepad{
      display:grid;
      grid-template-columns: repeat(3, 100px);
      gap: 15px;
    }

    button{
      width:100px;
      height:100px;
      font-size:40px;
      font-weight:bold;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background: linear-gradient(145deg, #ffff00, #ffdd00);
      color:#000;
      transition: all 0.05s;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      box-shadow: 0 6px 0 #cccc00;
      font-family: Arial, sans-serif;
    }
    button:active{
      transform: translateY(6px);
      box-shadow: 0 0 0 #cccc00;
      background: linear-gradient(145deg, #ffdd00, #ffff00);
    }
    button:disabled{ opacity:.5; cursor:not-allowed; }

    #up{ grid-column:2; grid-row:1; }
    #left{ grid-column:1; grid-row:2; }
    #down{ grid-column:2; grid-row:2; }
    #right{ grid-column:3; grid-row:2; }
  </style>
</head>

<body>
  <div id="status">Connecting...</div>

  <div class="gamepad">
    <button id="up" disabled>⬆️</button>
    <button id="left" disabled>⬅️</button>
    <button id="down" disabled>⬇️</button>
    <button id="right" disabled>➡️</button>
  </div>

  <!-- Firebase (COMPAT) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
      authDomain: "pacman-86c4e.firebaseapp.com",
      databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
      projectId: "pacman-86c4e",
      storageBucket: "pacman-86c4e.firebasestorage.app",
      messagingSenderId: "1044337774275",
      appId: "1:1044337774275:web:362fcd603a473c04e95c76"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const statusDiv = document.getElementById("status");
    const params = new URLSearchParams(location.search);
    const room = params.get("room");
    const gameId = params.get("gameId");

    let playerConnected = false;
    let lastActionTime = 0;

    function enableButtons(on){
      document.querySelectorAll(".gamepad button").forEach(b => b.disabled = !on);
    }

    function randomName(){
      const animals = ["Panda","Fox","Tiger","Koala","Shark","Eagle","Wolf","Otter"];
      return animals[Math.floor(Math.random()*animals.length)] + "-" + Math.floor(100 + Math.random()*900);
    }

    function connect(){
      if(!room || !gameId){
        statusDiv.textContent = "❌ Invalid QR Code";
        statusDiv.className = "status-error";
        enableButtons(false);
        return;
      }

      const gameRef = db.ref(`games/${gameId}`);

      gameRef.once("value", snap => {
        if(!snap.exists()){
          statusDiv.textContent = "❌ Game not found";
          statusDiv.className = "status-error";
          enableButtons(false);
          playerConnected = false;
          return;
        }

        // Register player (optional)
        const playerId = db.ref().push().key;
        gameRef.child(`players/${playerId}`).set({
          name: randomName(),
          joinedAt: Date.now()
        });

        playerConnected = true;
        statusDiv.textContent = "✅ Connected!";
        statusDiv.className = "status-ok";
        enableButtons(true);
      });
    }

    function sendInput(action){
      if(!playerConnected || !gameId) return;

      const now = Date.now();
      if(now - lastActionTime < 50) return; // throttle
      lastActionTime = now;

      db.ref(`games/${gameId}/actions/lastAction`).set(action, (err) => {
        if(err){
          console.error(err);
          statusDiv.textContent = "⚠️ Connection lost";
          statusDiv.className = "status-error";
          playerConnected = false;
          enableButtons(false);
        }
      });
    }

    ["up","down","left","right"].forEach(id => {
      const el = document.getElementById(id);

      el.addEventListener("click", () => sendInput(id));

      el.addEventListener("touchstart", (e) => {
        e.preventDefault();
        sendInput(id);
      }, {passive:false});
    });

    // Connection monitor
    db.ref(".info/connected").on("value", snap => {
      if(snap.val() === true){
        if(!playerConnected) connect();
      } else {
        statusDiv.textContent = "❌ No internet";
        statusDiv.className = "status-error";
        playerConnected = false;
        enableButtons(false);
      }
    });

    window.addEventListener("load", () => {
      enableButtons(false);
      setTimeout(connect, 200);
    });
  </script>
</body>
</html>
