<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Pac-Man Controller</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; }
    body{
      display:flex;
      flex-direction:column;
      justify-content:space-around;
      align-items:center;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      font-family: Arial, sans-serif;
      color:#fff;
      padding: 20px;
      gap: 20px;
      touch-action:none;
    }

    #status{ height: 26px; font-size: 16px; text-align:center; }
    .ok{ color:#00ff00; font-weight:bold; }
    .bad{ color:#ff0000; font-weight:bold; }

    .gamepad{
      display:grid;
      grid-template-columns: repeat(3, 100px);
      gap: 15px;
    }

    button{
      width:100px;
      height:100px;
      font-size:40px;
      font-weight:bold;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background: linear-gradient(145deg, #ffff00, #ffdd00);
      color:#000;
      transition: all 0.05s;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      box-shadow: 0 6px 0 #cccc00;
    }
    button:active{
      transform: translateY(6px);
      box-shadow: 0 0 0 #cccc00;
      background: linear-gradient(145deg, #ffdd00, #ffff00);
    }
    button:disabled{ opacity: 0.5; cursor:not-allowed; }

    #up{ grid-column:2; grid-row:1; }
    #left{ grid-column:1; grid-row:2; }
    #down{ grid-column:2; grid-row:2; }
    #right{ grid-column:3; grid-row:2; }
  </style>
</head>

<body>
  <div id="status">Connecting...</div>

  <div class="gamepad">
    <button id="up">⬆️</button>
    <button id="left">⬅️</button>
    <button id="down">⬇️</button>
    <button id="right">➡️</button>
  </div>

  <!-- Firebase (COMPAT) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
      authDomain: "pacman-86c4e.firebaseapp.com",
      databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
      projectId: "pacman-86c4e",
      storageBucket: "pacman-86c4e.firebasestorage.app",
      messagingSenderId: "1044337774275",
      appId: "1:1044337774275:web:362fcd603a473c04e95c76"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const statusEl = document.getElementById("status");
    const params = new URLSearchParams(location.search);
    const gameId = params.get("gameId") || "DEMO_GAME";

    function setStatusOk(msg){
      statusEl.textContent = msg;
      statusEl.className = "ok";
    }
    function setStatusBad(msg){
      statusEl.textContent = msg;
      statusEl.className = "bad";
    }

    function send(action){
      db.ref(`games/${gameId}/actions/lastAction`).set({
        action,
        t: Date.now()
      }, (err) => {
        if (err) setStatusBad("❌ Send failed");
        else setStatusOk("✅ Connected");
      });
    }

    // Touch + click
    ["up","down","left","right"].forEach(id => {
      const el = document.getElementById(id);

      el.addEventListener("click", () => send(id));

      el.addEventListener("touchstart", (e) => {
        e.preventDefault();
        send(id);
      }, { passive:false });
    });

    // Connection indicator
    db.ref(".info/connected").on("value", snap => {
      if (snap.val() === true) setStatusOk("✅ Connected");
      else setStatusBad("❌ No internet");
    });
  </script>
</body>
</html>
