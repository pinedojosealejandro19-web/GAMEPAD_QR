<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>QR Gamepad</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
      color: #fff;
      font-family: system-ui, Arial, sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    .app {
      min-height: 100svh;
      height: 100dvh;
      padding: 16px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .top {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input, button {
      font-size: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: #fff;
    }

    button {
      cursor: pointer;
    }

    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-content: end;
    }

    .btn {
      width: 100%;
      height: min(22vh, 140px);
      font-size: 28px;
      border-radius: 22px;
    }

    #status {
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <input id="room" placeholder="ROOM (ABCD)" />
      <button id="join">Join</button>
    </div>

    <p id="status">Not connected</p>

    <div class="grid">
      <button class="btn" id="left">⬅️</button>
      <button class="btn" id="right">➡️</button>
      <button class="btn" id="jump">🟦 Jump</button>
      <button class="btn" id="down">⬇️</button>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
      authDomain: "pacman-86c4e.firebaseapp.com",
      databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
      projectId: "pacman-86c4e",
      storageBucket: "pacman-86c4e.firebasestorage.app",
      messagingSenderId: "1044337774275",
      appId: "1:1044337774275:web:362fcd603a473c04e95c76"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let room = "";
    let ref = null;

    document.getElementById("join").onclick = () => {
      room = (document.getElementById("room").value.trim() || "ABCD");
      ref = db.ref("rooms/" + room + "/input");
      document.getElementById("status").textContent = "Connected to: " + room;
      ref.set({ action: "connected", t: Date.now() });
    };

    function send(action) {
      if (!ref) return alert("Join a room first");
      ref.set({ action, t: Date.now() });
    }

    ["left","right","jump","down"].forEach(id => {
      const el = document.getElementById(id);

      el.onclick = () => send(id);

      el.addEventListener("touchstart", e => {
        e.preventDefault();
        send(id);
      }, { passive: false });
    });
  </script>
</body>
</html>
