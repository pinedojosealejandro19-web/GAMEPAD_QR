<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Pac-Man Gamepad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: row;
      justify-content: space-around;
      align-items: center;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      font-family: Arial, sans-serif;
      color: white;
      padding: 20px;
      touch-action: none;
      gap: 40px;
    }
    
    /* Left - Status */
    #statusSection {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
      min-width: 150px;
    }
    
    #status {
      font-size: 18px;
      text-align: center;
      font-weight: bold;
      height: 30px;
    }
    
    .status-ok {
      color: #00ff00;
    }
    
    .status-error {
      color: #ff0000;
    }
    
    #roomLabel {
      font-size: 14px;
      color: #aaa;
    }
    
    /* Middle - Gamepad (Large for Landscape) */
    .gamepad {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-gap: 20px;
    }
    
    button {
      width: 120px;
      height: 120px;
      font-size: 50px;
      font-weight: bold;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      background: linear-gradient(145deg, #ffff00, #ffdd00);
      color: #000;
      transition: all 0.05s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      box-shadow: 0 8px 0 #cccc00;
      font-family: Arial, sans-serif;
    }
    
    button:active {
      transform: translateY(8px);
      box-shadow: 0 0 0 #cccc00;
      background: linear-gradient(145deg, #ffdd00, #ffff00);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #up { grid-column: 2; grid-row: 1; }
    #left { grid-column: 1; grid-row: 2; }
    #down { grid-column: 2; grid-row: 2; }
    #right { grid-column: 3; grid-row: 2; }
    
    /* Right - Instructions */
    #infoSection {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
      min-width: 150px;
    }
    
    #infoSection h3 {
      font-size: 16px;
      color: #ffff00;
    }
    
    #infoSection p {
      font-size: 13px;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }
    
    /* Mobile/Small Screen Adjustments */
    @media (max-height: 500px) {
      .gamepad {
        grid-template-columns: repeat(3, 90px);
        grid-gap: 12px;
      }
      
      button {
        width: 90px;
        height: 90px;
        font-size: 36px;
        box-shadow: 0 5px 0 #cccc00;
      }
      
      button:active {
        transform: translateY(5px);
      }
      
      #status {
        font-size: 16px;
      }
      
      body {
        gap: 20px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <!-- LEFT - Status Info -->
  <div id="statusSection">
    <div id="status">Connecting...</div>
    <div id="roomLabel">Room: --</div>
  </div>
  
  <!-- MIDDLE - Gamepad Controls -->
  <div class="gamepad">
    <button id="up" disabled>⬆️</button>
    <button id="left" disabled>⬅️</button>
    <button id="down" disabled>⬇️</button>
    <button id="right" disabled>➡️</button>
  </div>
  
  <!-- RIGHT - Info -->
  <div id="infoSection">
    <h3>🎮 Gamepad</h3>
    <p>Use the arrows to control Pac-Man</p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
  
  <script>
    // ===== FIREBASE CONFIG (SAME AS MAIN PAGE) =====
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ===== CONTROLLER LOGIC =====
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const gameId = urlParams.get('gameId');
    const statusDiv = document.getElementById('status');
    const roomLabel = document.getElementById('roomLabel');

    let playerConnected = false;
    let lastActionTime = 0;

    // Check connection to game
    function checkConnection() {
      if (!roomCode || !gameId) {
        statusDiv.textContent = '❌ Invalid QR Code';
        statusDiv.className = 'status-error';
        roomLabel.textContent = 'Room: Invalid';
        disableButtons();
        return;
      }

      roomLabel.textContent = `Room: ${roomCode}`;

      const gameRef = db.ref(`games/${gameId}`);
      
      gameRef.once('value', (snapshot) => {
        if (snapshot.exists()) {
          playerConnected = true;
          statusDiv.textContent = '✅ Connected!';
          statusDiv.className = 'status-ok';
          enableButtons();
        } else {
          statusDiv.textContent = '❌ Game not found';
          statusDiv.className = 'status-error';
          disableButtons();
        }
      });
    }

    // Send input to Firebase
    function sendInput(action) {
      if (!playerConnected || !gameId) return;

      const now = Date.now();
      // Throttle inputs (50ms delay to avoid spam)
      if (now - lastActionTime < 50) return;
      lastActionTime = now;

      const actionRef = db.ref(`games/${gameId}/actions/lastAction`);
      actionRef.set(action, (error) => {
        if (error) {
          console.error('Error sending input:', error);
          statusDiv.textContent = '⚠️ Connection lost';
          statusDiv.className = 'status-error';
          disableButtons();
        }
      });
    }

    // Enable gamepad buttons
    function enableButtons() {
      document.querySelectorAll('.gamepad button').forEach(btn => {
        btn.disabled = false;
      });
    }

    // Disable gamepad buttons
    function disableButtons() {
      document.querySelectorAll('.gamepad button').forEach(btn => {
        btn.disabled = true;
      });
    }

    // Setup button event listeners
    const buttons = ['up', 'down', 'left', 'right'];

    buttons.forEach(button => {
      const el = document.getElementById(button);
      
      // Touch events
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        el.style.background = 'linear-gradient(145deg, #ffdd00, #ffff00)';
        sendInput(button);
      });
      
      el.addEventListener('touchend', (e) => {
        e.preventDefault();
        el.style.background = 'linear-gradient(145deg, #ffff00, #ffdd00)';
      });

      // Mouse events (for testing)
      el.addEventListener('mousedown', () => {
        el.style.background = 'linear-gradient(145deg, #ffdd00, #ffff00)';
        sendInput(button);
      });

      el.addEventListener('mouseup', () => {
        el.style.background = 'linear-gradient(145deg, #ffff00, #ffdd00)';
      });

      el.addEventListener('mouseleave', () => {
        el.style.background = 'linear-gradient(145deg, #ffff00, #ffdd00)';
      });
    });

    // Check connection on load
    window.addEventListener('load', () => {
      setTimeout(checkConnection, 500);
    });

    // Monitor Firebase connection
    db.ref('.info/connected').on('value', (snapshot) => {
      if (snapshot.val() === true) {
        if (!playerConnected) {
          checkConnection();
        }
      } else {
        statusDiv.textContent = '❌ No internet';
        statusDiv.className = 'status-error';
        playerConnected = false;
        disableButtons();
      }
    });

    // Reconnect if game is lost
    setInterval(() => {
      if (!playerConnected && roomCode && gameId) {
        checkConnection();
      }
    }, 5000);
  </script>
</body>
</html>
